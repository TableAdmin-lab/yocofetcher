name: YOCO Sales Sync

on:
  workflow_dispatch:
    inputs:
      yoco_email:
        description: 'YOCO Login Email'
        required: true
        type: string
      yoco_password:
        description: 'YOCO Login Password'
        required: true
        type: string

jobs:
  fetch-report:
    runs-on: ubuntu-latest
    # Wait time eliminated by using official playright container
    container:
      image: mcr.microsoft.com/playwright:v1.41.0-jammy
    permissions:
      contents: write # Needed to commit the CSV back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node Caching
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install

      - name: Run Yoco Sync Engine
        env:
          YOCO_EMAIL: ${{ github.event.inputs.yoco_email }}
          YOCO_PASSWORD: ${{ github.event.inputs.yoco_password }}
        run: npm start

      - name: Commit and Push XLSX
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_yoco_products.xlsx
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync: Latest YOCO Products Report"
          git push || echo "No changes to push"
