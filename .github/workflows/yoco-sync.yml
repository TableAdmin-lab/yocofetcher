name: YOCO Sales Sync

on:
  workflow_dispatch:
    inputs:
      yoco_email:
        description: 'YOCO Login Email'
        required: true
        type: string
      yoco_password:
        description: 'YOCO Login Password'
        required: true
        type: string

jobs:
  fetch-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the CSV back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright Scraper
        env:
          YOCO_EMAIL: ${{ github.event.inputs.yoco_email }}
          YOCO_PASSWORD: ${{ github.event.inputs.yoco_password }}
        run: node yoco-scraper.js

      - name: Commit and Push CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_yoco_sales.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync: Latest YOCO Sales Report"
          git push
