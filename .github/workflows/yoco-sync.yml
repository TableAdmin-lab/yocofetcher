name: YOCO Sales Sync

on:
  workflow_dispatch:
    inputs:
      yoco_email:
        description: "YOCO Login Email"
        required: true
        type: string
      yoco_password:
        description: "YOCO Login Password"
        required: true
        type: string

jobs:
  fetch-report:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Rolling cache for Playwright auth state (restores most recent cache via restore-keys)
      - name: Cache Playwright auth state
        uses: actions/cache@v4
        with:
          path: .playwright
          key: ${{ runner.os }}-yoco-auth-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-yoco-auth-

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      - name: Run Yoco Sync Engine
        env:
          YOCO_EMAIL: ${{ github.event.inputs.yoco_email }}
          YOCO_PASSWORD: ${{ github.event.inputs.yoco_password }}
        run: node yoco-scraper.js

      - name: Commit and Push XLSX
        run: |
          git config --global --add safe.directory '*'
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add latest_yoco_sales.xlsx latest_yoco_catalog.xlsx

          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync: Latest YOCO Sales and Catalog Reports"
          git push || echo "No changes to push"

      - name: Upload Debug Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-screenshot
          path: error_screenshot.png
          retention-days: 3
